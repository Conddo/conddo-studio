name: CI

# Per Infrastructure Working Doc §5: every push runs lint + typecheck +
# build. Studio's branch flow mirrors conddo-app and the BE — same
# feature/* → dev → staging → production progression so a release
# rides the same train across all three services.

on:
  push:
    branches: [main, dev, staging, production]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Studio talks to its own backend; the URL gets injected at
          # build time so every environment (dev/staging/prod) can
          # point at a different deploy. Default keeps local dev
          # working without env vars set.
          NEXT_PUBLIC_STUDIO_API_URL: ${{ vars.NEXT_PUBLIC_STUDIO_API_URL || 'http://localhost:8083' }}
